name: Release

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - closed

jobs:
  prepare-release-version:
    if: >
      github.event.action != 'closed' &&
      github.event.pull_request.head.ref == 'develop'

    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - name: Checkout develop
        uses: actions/checkout@v5
        with:
          ref: develop
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Config Git
        run: |
          git config user.name "smart-green-frontend-bot"
          git config user.email "smart-green-frontend-bot@users.noreply.github.com"

      - name: Remove SNAPSHOT
        id: release-version
        run: |
          VERSION=$(node -p "require('./package.json').version")

          echo "Versión actual: $VERSION"

          if [[ "$VERSION" != *"-SNAPSHOT" ]]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          RELEASE_VERSION=${VERSION/-SNAPSHOT/}

          echo "Nueva release: $RELEASE_VERSION"

          npm version "$RELEASE_VERSION" --no-git-tag-version

          echo "release=$RELEASE_VERSION" >> $GITHUB_OUTPUT
          echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit release version
        if: steps.release-version.outputs.changed == 'true'
        run: |
          git add package.json package-lock.json
          git commit -m "release: v${{ steps.release-version.outputs.release }}"
          git push origin HEAD:develop

  release:
    if: >
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true &&
      github.event.pull_request.head.ref == 'develop'

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Config Git
        run: |
          git config user.name "release-bot"
          git config user.email "release-bot@users.noreply.github.com"

      - name: Get release version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")

          if [[ "$VERSION" == *"-SNAPSHOT" ]]; then
            echo "ERROR: main no debe tener SNAPSHOT"
            exit 1
          fi

          echo "release=$VERSION" >> $GITHUB_OUTPUT

      - name: Create tag
        run: |
          TAG="v${{ steps.version.outputs.release }}"

          if git ls-remote --exit-code --tags origin "refs/tags/$TAG"; then
            echo "ERROR: Tag ya existe"
            exit 1
          fi

          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Merge main into develop
        run: |
          git fetch origin main develop
          git checkout -B develop origin/develop
          git merge --no-edit origin/main

      - name: Increment minor and add SNAPSHOT
        run: |
          CURRENT=${{ steps.version.outputs.release }}

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          NEW_MINOR=$((MINOR + 1))
          NEXT_VERSION="$MAJOR.$NEW_MINOR.0-SNAPSHOT"

          echo "Nueva versión: $NEXT_VERSION"

          npm version "$NEXT_VERSION" --no-git-tag-version

      - name: Commit next snapshot
        run: |
          git add package.json package-lock.json
          git commit -m "chore: next development version"

      - name: Push develop
        run: |
          git push origin HEAD:develop