server {
    listen 80;
    server_name liangcatech.top www.liangcatech.top www.smartgreenhouse.liangcatech.top smartgreenhouse.liangcatech.top;

    root /usr/share/nginx/html;
    index index.html;

    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/cerboot;
    }
}