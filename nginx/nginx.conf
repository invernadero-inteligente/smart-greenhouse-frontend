server {
    listen 80;
    server_name liangcatech.top www.liangcatech.top smartgreenhouse.liangcatech.top;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name liangcatech.top www.liangcatech.top smartgreenhouse.liangcatech.top;

    ssl_certificate /etc/letsencrypt/live/liangcatech.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/liangcatech.top/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}